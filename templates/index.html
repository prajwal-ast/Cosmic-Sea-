<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmic Sea Mission Control</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap');

      :root {
        --bg-deep: #040914;
        --bg-mid: #08192d;
        --bg-grid: rgba(89, 206, 255, 0.08);
        --panel: rgba(8, 20, 38, 0.72);
        --panel-border: rgba(114, 196, 255, 0.24);
        --text-main: #e9f6ff;
        --text-dim: #97b6cf;
        --cyan: #59ceff;
        --mint: #4ef2c2;
        --amber: #ffc35a;
        --danger: #ff646e;
        --violet: #7da0ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text-main);
        font-family: 'Space Grotesk', sans-serif;
        background:
          radial-gradient(1200px 700px at 15% -10%, #1a3e72 0%, transparent 45%),
          radial-gradient(1100px 700px at 120% 0%, #113856 0%, transparent 48%),
          linear-gradient(180deg, #061123 0%, var(--bg-deep) 60%);
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(var(--bg-grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
        background-size: 34px 34px;
        mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      }

      .shell {
        max-width: 1300px;
        margin: 0 auto;
        padding: 20px;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
        margin-bottom: 16px;
      }

      .title {
        margin: 0;
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(22px, 4vw, 38px);
        letter-spacing: 1.2px;
        text-transform: uppercase;
      }

      .subtitle {
        color: var(--text-dim);
        margin-top: 6px;
        font-size: 14px;
      }

      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        border: 1px solid var(--panel-border);
        background: rgba(6, 18, 33, 0.9);
        color: var(--text-dim);
        padding: 7px 10px;
        border-radius: 999px;
        font-size: 12px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 14px;
      }

      .column {
        display: grid;
        gap: 14px;
      }

      .panel {
        border: 1px solid var(--panel-border);
        background: linear-gradient(160deg, rgba(7, 19, 37, 0.9), var(--panel));
        backdrop-filter: blur(8px);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 0 0 1px rgba(54, 102, 151, 0.15) inset;
      }

      .panel-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        color: var(--cyan);
        margin-bottom: 12px;
        text-transform: uppercase;
      }

      .sat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 10px;
      }

      .sat-card {
        border: 1px solid rgba(122, 179, 255, 0.25);
        border-radius: 12px;
        padding: 10px;
        background: rgba(6, 18, 31, 0.78);
      }

      .sat-id {
        font-family: 'Orbitron', sans-serif;
        font-size: 13px;
        letter-spacing: 0.6px;
      }

      .sat-score {
        margin-top: 6px;
        font-size: 24px;
        font-weight: 700;
      }

      .sat-meta {
        margin-top: 7px;
        font-size: 12px;
        color: var(--text-dim);
      }

      .trust-bar {
        margin-top: 9px;
        height: 7px;
        border-radius: 999px;
        background: #10233d;
        overflow: hidden;
      }

      .trust-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--mint), var(--cyan));
        box-shadow: 0 0 10px rgba(89, 206, 255, 0.45);
      }

      .stage {
        margin-top: 7px;
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 999px;
        display: inline-flex;
        font-weight: 700;
        letter-spacing: 0.4px;
      }

      .stage.healthy { background: rgba(78, 242, 194, 0.12); color: var(--mint); border: 1px solid rgba(78, 242, 194, 0.35); }
      .stage.monitor { background: rgba(125, 160, 255, 0.12); color: var(--violet); border: 1px solid rgba(125, 160, 255, 0.35); }
      .stage.throttle { background: rgba(255, 195, 90, 0.12); color: var(--amber); border: 1px solid rgba(255, 195, 90, 0.35); }
      .stage.quarantine, .stage.isolated { background: rgba(255, 100, 110, 0.14); color: var(--danger); border: 1px solid rgba(255, 100, 110, 0.35); }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(120px, 1fr));
        gap: 8px;
      }

      .kpi {
        border: 1px solid rgba(111, 173, 255, 0.22);
        background: rgba(5, 17, 30, 0.8);
        border-radius: 10px;
        padding: 10px;
      }

      .kpi-label {
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .kpi-value {
        margin-top: 4px;
        font-size: 20px;
        font-weight: 700;
      }

      .scroll-list {
        max-height: 255px;
        overflow: auto;
        display: grid;
        gap: 8px;
        padding-right: 4px;
      }

      .item {
        border: 1px solid rgba(117, 169, 232, 0.22);
        background: rgba(7, 19, 34, 0.8);
        border-left: 3px solid var(--amber);
        border-radius: 9px;
        padding: 8px 10px;
        font-size: 12px;
      }

      .item.critical { border-left-color: var(--danger); }
      .item.action { border-left-color: var(--cyan); }

      .tiny {
        color: var(--text-dim);
        font-size: 11px;
        margin-bottom: 4px;
      }

      .blocked {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        font-size: 12px;
        border: 1px solid rgba(255, 100, 110, 0.4);
        color: #ffd8da;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 100, 110, 0.1);
      }

      .chip.none {
        color: var(--text-dim);
        border-color: rgba(117, 169, 232, 0.3);
        background: rgba(10, 26, 45, 0.7);
      }

      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 rgba(89, 206, 255, 0.0); }
        50% { box-shadow: 0 0 22px rgba(89, 206, 255, 0.35); }
      }

      .live {
        animation: pulse 2.2s infinite;
      }

      @media (max-width: 1024px) {
        .layout { grid-template-columns: 1fr; }
      }

      @media (max-width: 700px) {
        .shell { padding: 14px; }
        .hero { flex-direction: column; align-items: start; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <h1 class="title">Cosmic Sea Mission Control</h1>
          <div class="subtitle" id="timestamp">Initializing secure orbital mesh...</div>
        </div>
        <div class="pills">
          <div class="pill live">Zero Trust Active</div>
          <div class="pill">AI Anomaly Engine</div>
          <div class="pill">Autonomous Defense</div>
        </div>
      </header>

      <section class="layout">
        <div class="column">
          <div class="panel">
            <div class="panel-title">Satellite Trust Mesh</div>
            <div class="sat-grid" id="satellite-grid"></div>
          </div>

          <div class="panel">
            <div class="panel-title">Security Alerts</div>
            <div class="scroll-list" id="alerts-list"></div>
          </div>
        </div>

        <div class="column">
          <div class="panel">
            <div class="panel-title">Autonomous Defense KPIs</div>
            <div class="kpi-grid" id="kpi-grid"></div>
          </div>

          <div class="panel">
            <div class="panel-title">Containment Watchlist</div>
            <div class="blocked" id="blocked-list"></div>
          </div>

          <div class="panel">
            <div class="panel-title">Recent Defense Actions</div>
            <div class="scroll-list" id="actions-list"></div>
          </div>
        </div>
      </section>
    </div>

    <script>
      const API_BASE = window.COSMIC_API_BASE || '';

      function fmt(value, digits = 2) {
        const n = Number(value || 0);
        return Number.isFinite(n) ? n.toFixed(digits) : '0.00';
      }

      function renderState(state) {
        if (!state) return;

        document.getElementById('timestamp').textContent =
          `Mode: ${state.mode || 'simulation'} | Active GS: ${state.active_ground_station} | Stations: ${state.ground_stations.join(', ')} | UTC: ${state.time}`;

        const satGrid = document.getElementById('satellite-grid');
        satGrid.innerHTML = '';
        (state.satellites || []).forEach((sat) => {
          const stage = String(sat.stage || 'healthy').toLowerCase();
          const trust = Math.max(0, Math.min(100, Number(sat.trust || 0)));

          const card = document.createElement('div');
          card.className = 'sat-card';
          card.innerHTML = `
            <div class="sat-id">${sat.id}</div>
            <div class="sat-score">${fmt(trust, 1)}</div>
            <div class="sat-meta">AI Risk: ${fmt(sat.ai_risk, 3)}</div>
            <div class="trust-bar"><div class="trust-fill" style="width:${trust}%"></div></div>
            <div class="stage ${stage}">${stage.toUpperCase()}</div>
          `;
          satGrid.appendChild(card);
        });

        const kpi = state.defense_kpis || {};
        const kpiItems = [
          ['Incidents', kpi.total_incidents ?? 0],
          ['Active', kpi.active_incidents ?? 0],
          ['Containment', `${fmt((kpi.containment_rate ?? 0) * 100, 1)}%`],
          ['MTTD', `${fmt(kpi.mttd_seconds, 3)}s`],
          ['MTTC', `${fmt(kpi.mttc_seconds, 3)}s`],
          ['MTTR', `${fmt(kpi.mttr_seconds, 3)}s`],
        ];

        const kpiGrid = document.getElementById('kpi-grid');
        kpiGrid.innerHTML = '';
        kpiItems.forEach(([label, value]) => {
          const el = document.createElement('div');
          el.className = 'kpi';
          el.innerHTML = `<div class="kpi-label">${label}</div><div class="kpi-value">${value}</div>`;
          kpiGrid.appendChild(el);
        });

        const blocked = document.getElementById('blocked-list');
        blocked.innerHTML = '';
        const blockedItems = state.blocked || [];
        if (!blockedItems.length) {
          blocked.innerHTML = '<div class="chip none">No blocked nodes</div>';
        } else {
          blockedItems.forEach((id) => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.textContent = id;
            blocked.appendChild(chip);
          });
        }

        const alerts = document.getElementById('alerts-list');
        alerts.innerHTML = '';
        const alertItems = (state.alerts || []).slice(0, 16);
        if (!alertItems.length) {
          alerts.innerHTML = '<div class="item">No active alerts</div>';
        } else {
          alertItems.forEach((item) => {
            const row = document.createElement('div');
            row.className = `item ${item.level === 'critical' ? 'critical' : ''}`;
            row.innerHTML = `<div class="tiny">${item.timestamp}</div><div>${item.message}</div>`;
            alerts.appendChild(row);
          });
        }

        const actions = document.getElementById('actions-list');
        actions.innerHTML = '';
        const actionItems = (kpi.recent_actions || []).slice().reverse();
        if (!actionItems.length) {
          actions.innerHTML = '<div class="item action">No autonomous actions yet</div>';
        } else {
          actionItems.forEach((a) => {
            const row = document.createElement('div');
            row.className = 'item action';
            row.innerHTML = `<div class="tiny">${a.time}</div><div>${a.identity} -> ${a.stage} | ${a.action}</div>`;
            actions.appendChild(row);
          });
        }
      }

      async function pollFallback() {
        const response = await fetch(`${API_BASE}/api/state`);
        const state = await response.json();
        renderState(state);
      }

      function startSSE() {
        const stream = new EventSource(`${API_BASE}/api/stream`);
        stream.onmessage = (evt) => {
          try {
            renderState(JSON.parse(evt.data));
          } catch (_) {}
        };
        stream.onerror = () => {
          stream.close();
          setInterval(pollFallback, 1600);
        };
      }

      startSSE();
      pollFallback();
    </script>
  </body>
</html>
