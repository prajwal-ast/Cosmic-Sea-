<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmic Sea Mission Control</title>
    <style>
      :root {
        --bg: #081122;
        --panel: #11213d;
        --panel-2: #182c4d;
        --text: #f0f5ff;
        --ok: #68d391;
        --warn: #f6ad55;
        --bad: #fc8181;
        --accent: #6ee7ff;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #16315e 0%, var(--bg) 52%);
      }
      .layout {
        max-width: 1080px;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        margin: 0 0 8px;
        letter-spacing: 1px;
      }
      .sub {
        color: #b5c7ea;
        margin-bottom: 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 12px;
      }
      .card {
        background: linear-gradient(160deg, var(--panel), var(--panel-2));
        border: 1px solid #294872;
        border-radius: 10px;
        padding: 12px;
      }
      .score {
        font-size: 20px;
        font-weight: 700;
      }
      .isolated {
        color: var(--bad);
        font-weight: 700;
      }
      .healthy {
        color: var(--ok);
        font-weight: 700;
      }
      .meta {
        margin-top: 8px;
        font-size: 12px;
        color: #b9caea;
      }
      .section-title {
        margin: 16px 0 8px;
        color: var(--accent);
      }
      .list {
        background: #0d1c35;
        border: 1px solid #27466f;
        border-radius: 10px;
        padding: 10px;
        min-height: 84px;
      }
      .alert {
        border-left: 3px solid var(--warn);
        padding: 6px 8px;
        margin-bottom: 6px;
        background: #102445;
        font-size: 13px;
      }
      .alert.critical {
        border-color: var(--bad);
      }
      @media (max-width: 640px) {
        h1 {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <h1>COSMIC SEA - Mission Control</h1>
      <div class="sub" id="timestamp">Loading...</div>

      <div class="section-title">Satellite Trust Mesh</div>
      <div class="grid" id="satellite-grid"></div>

      <div class="section-title">Blocked Devices</div>
      <div class="list" id="blocked-list">None</div>

      <div class="section-title">Autonomous Defense KPIs</div>
      <div class="list" id="kpi-list">Loading...</div>

      <div class="section-title">Alerts</div>
      <div class="list" id="alerts-list"></div>
    </div>

    <script>
      const API_BASE = window.COSMIC_API_BASE || '';

      function renderState(state) {
        if (!state) return;

        document.getElementById('timestamp').textContent =
          `Mode: ${state.mode || 'simulation'} | Active Ground Station: ${state.active_ground_station} | All Stations: ${state.ground_stations.join(', ')} | UTC: ${state.time}`;

        const grid = document.getElementById('satellite-grid');
        grid.innerHTML = '';
        state.satellites.forEach((sat) => {
          const card = document.createElement('div');
          card.className = 'card';
          const statusClass = sat.isolated ? 'isolated' : 'healthy';
          const statusLabel = sat.isolated ? 'Isolated' : sat.stage.toUpperCase();
          card.innerHTML = `
            <div><strong>${sat.id}</strong></div>
            <div class="score">Trust ${sat.trust.toFixed(2)}</div>
            <div class="meta">AI Risk ${sat.ai_risk.toFixed(3)}</div>
            <div class="${statusClass}">${statusLabel}</div>
            <div class="meta">Zero Trust: signature + HMAC + timestamp/nonce + AES + key epochs</div>
          `;
          grid.appendChild(card);
        });

        const blocked = document.getElementById('blocked-list');
        blocked.textContent = state.blocked.length ? state.blocked.join(', ') : 'None';

        const kpi = state.defense_kpis || {};
        const kpiList = document.getElementById('kpi-list');
        kpiList.textContent =
          `Incidents=${kpi.total_incidents ?? 0} | Active=${kpi.active_incidents ?? 0} | ContainmentRate=${((kpi.containment_rate ?? 0) * 100).toFixed(1)}% | MTTD=${(kpi.mttd_seconds ?? 0).toFixed(3)}s | MTTC=${(kpi.mttc_seconds ?? 0).toFixed(3)}s | MTTR=${(kpi.mttr_seconds ?? 0).toFixed(3)}s`;

        const alerts = document.getElementById('alerts-list');
        alerts.innerHTML = '';
        const items = state.alerts.slice(0, 12);
        if (!items.length) {
          alerts.textContent = 'No active alerts';
        } else {
          items.forEach((item) => {
            const div = document.createElement('div');
            div.className = `alert ${item.level === 'critical' ? 'critical' : ''}`;
            div.textContent = `${item.timestamp} | ${item.level.toUpperCase()} | ${item.message}`;
            alerts.appendChild(div);
          });
        }
      }

      async function pollFallback() {
        const response = await fetch(`${API_BASE}/api/state`);
        const state = await response.json();
        renderState(state);
      }

      function startSSE() {
        const stream = new EventSource(`${API_BASE}/api/stream`);
        stream.onmessage = (evt) => {
          try {
            renderState(JSON.parse(evt.data));
          } catch (_) {}
        };
        stream.onerror = () => {
          stream.close();
          setInterval(pollFallback, 1500);
        };
      }

      startSSE();
      pollFallback();
    </script>
  </body>
</html>
